services:
  api:
    build: ./api
    container_name: motocare-jobs-api
    ports:
      - '3001:3001'
    volumes:
      - ./api/data:/app/data
    environment:
      - DB_PATH=./data/motocarejobs.sqlite

  web:
    build: ./web
    container_name: motocare-jobs-web
    ports:
      - '4173:4173'
    depends_on:
      - api
